<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Image Tracking AR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

#status {
    position:fixed;
    top:10px;
    left:10px;
    z-index:9999;
    background:rgba(0,0,0,.7);
    color:white;
    padding:10px;
    border-radius:8px;
    font-family:Arial;
}
</style>
</head>

<body>

<div id="status">
Searching for image...
</div>

<a-scene
    mindar-image="
      imageTargetSrc: ./targets.mind;
      autoStart: true;
      uiScanning: yes;
      uiLoading: yes;
    "
    embedded
    color-space="sRGB"
    renderer="colorManagement:true, physicallyCorrectLights:true"
    vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false">

    <a-assets>

        <a-asset-item
            id="myModel"
            src="model.glb">
        </a-asset-item>

    </a-assets>

    <a-camera
        position="0 0 0"
        look-controls="enabled:false">
    </a-camera>

    <a-light
        type="ambient"
        intensity="1.5">
    </a-light>

    <a-light
        type="directional"
        position="1 2 1"
        intensity="1">
    </a-light>

    <!-- TARGET 0 -->
    <a-entity mindar-image-target="targetIndex:0">

  <a-gltf-model
    id="model"
    src="model.glb"
    position="0 0 0"
    scale="1 1 1">
</a-gltf-model>

    <script>
        window.addEventListener("load", () => {

        const model = document.querySelector("#model");

        model.addEventListener("model-loaded", () => {
            alert("MODEL LOADED");
        });

        model.addEventListener("model-error", (e) => {
            alert("MODEL ERROR");
        console.log(e);
        });

});
</script>

</a-entity>
<!-- check if the glb model is the problem
    <a-entity
        id="target"
        mindar-image-target="targetIndex:0">

        <a-gltf-model
            id="model"
            src="#myModel"
            position="0 0 0"
            rotation="0 0 0"
            scale="0.2 0.2 0.2">
        </a-gltf-model>

    </a-entity>
-->
</a-scene>

<script>

const target = document.querySelector("#target");
const status = document.querySelector("#status");

target.addEventListener("targetFound", () => {
    status.innerHTML = "Image Found";
    console.log("Image detected");
});

target.addEventListener("targetLost", () => {
    status.innerHTML = "Searching for image...";
    console.log("Image lost");
});

</script>

</body>
</html>
