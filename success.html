<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Image Tracking AR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

#status {
    position:fixed;
    top:10px;
    left:10px;
    z-index:9999;
    background:rgba(0,0,0,.7);
    color:white;
    padding:10px;
    border-radius:8px;
    font-family:Arial;
}
</style>
</head>

<body>

<div id="status">
Searching for image...
</div>

<a-scene
    mindar-image="
      imageTargetSrc: ./targets.mind;
      autoStart: true;
      uiScanning: yes;
      uiLoading: yes;
    "
    embedded
    color-space="sRGB"
    renderer="colorManagement:true, physicallyCorrectLights:true"
    vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false">

    <a-assets>

        <a-asset-item
            id="myModel"
            src="./Assets/model1.glb">
        </a-asset-item>

    </a-assets>

    <a-camera
        position="0 0 0"
        look-controls="enabled:false">
    </a-camera>

    <a-light
        type="ambient"
        intensity="1.5">
    </a-light>

    <a-light
        type="directional"
        position="1 2 1"
        intensity="1">
    </a-light>

    <!-- TARGET 0 -->
   <a-entity
    id="target"
    mindar-image-target="targetIndex:0">

  <a-gltf-model
        id="model"
        src="./Assets/model1.glb"
        position="0 0 0"
        rotation="0 0 0"
        scale="1 1 1"
        >
    </a-gltf-model>
</a-entity>


<script>
        window.addEventListener("load", () => {

        const model = document.querySelector("#model");

        model.addEventListener("model-loaded", () => {
            alert("MODEL LOADED");
        });

        model.addEventListener("model-error", (e) => {
            alert("MODEL ERROR");
        console.log(e);
        });

    });
</script>

<!--replacement code to activate touch controls--> 


<script>

            const target = document.querySelector("#target");
            const status = document.querySelector("#status");
            const model = document.querySelector("#model");

            let currentScale = 1;
            let currentRotationY = 0;

            let previousX = 0;
            let pinchDistance = null;

            function getDistance(t1, t2) {
            const dx = t1.clientX - t2.clientX;
            const dy = t1.clientY - t2.clientY;

            return Math.sqrt(dx * dx + dy * dy);
            }

            target.addEventListener("targetFound", () => {
            status.innerHTML = "Image Found";
            });

            target.addEventListener("targetLost", () => {
            status.innerHTML = "Searching for image...";
            });

            model.addEventListener("model-loaded", () => {
            console.log("MODEL LOADED");
            });

            model.addEventListener("model-error", (e) => {
            console.log("MODEL ERROR", e);
            });

            document.addEventListener("touchstart", (event) => {

            if (event.touches.length === 1) {

                previousX = event.touches[0].clientX;

            }

            if (event.touches.length === 2) {

                pinchDistance = getDistance(
                event.touches[0],
                event.touches[1]
                );

            }

            }, { passive:false });

            document.addEventListener("touchmove", (event) => {

            if (!model) return;

            // ROTATE

            if (event.touches.length === 1) {

                const currentX =
                event.touches[0].clientX;

                const deltaX =
                currentX - previousX;

                currentRotationY += deltaX * 0.5;

                model.setAttribute(
                "rotation",
                `0 ${currentRotationY} 0`
                );

                previousX = currentX;
            }

            // SCALE

            if (event.touches.length === 2) {

                const newDistance =
                getDistance(
                    event.touches[0],
                    event.touches[1]
                );

                const scaleFactor =
                newDistance / pinchDistance;

                currentScale *= scaleFactor;

                currentScale =
                Math.max(
                    0.1,
                    Math.min(currentScale, 20)
                );

                model.setAttribute(
                "scale",
                `${currentScale}
                ${currentScale}
                ${currentScale}`
                );

                pinchDistance = newDistance;
            }

            event.preventDefault();

            }, { passive:false });

            document.addEventListener("touchend", (event) => {

            if (event.touches.length < 2) {
                pinchDistance = null;
            }

});

</script>
